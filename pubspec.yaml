name: pharma_lookup_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  # Hỗ trợ font chữ đẹp
  google_fonts: ^6.2.1
  # Lưu token đăng nhập, trạng thái người dùng
  shared_preferences: ^2.2.3
  # Hỗ trợ hiển thị icon vector sắc nét
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Khai báo thư mục chứa ảnh
  assets:
    - assets/images/
    - assets/icons/